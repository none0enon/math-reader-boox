pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // Onyx/Boox SDK 仓库（仅提供 http）
        maven {
            url 'http://repo.boox.com/repository/maven-public/'
            allowInsecureProtocol = true
        }
        maven {
            url 'http://repo.boox.com/repository/proxy-public/'
            allowInsecureProtocol = true
        }
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = 'math-reader-boox'
include ':app'
